version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: horeca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: horeca_portal
      POSTGRES_USER: horeca_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-horeca_secret_2024}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/02-initial-schema.sql
      - ./database/migrations/003_payments.sql:/docker-entrypoint-initdb.d/03-payments.sql
      - ./database/migrations/004_orders.sql:/docker-entrypoint-initdb.d/04-orders.sql
      - ./database/migrations/005_vendors.sql:/docker-entrypoint-initdb.d/05-vendors.sql
      - ./database/migrations/006_performance_indexes.sql:/docker-entrypoint-initdb.d/06-indexes.sql
      - ./database/migrations/007_permissions.sql:/docker-entrypoint-initdb.d/07-permissions.sql
      - ./database/migrations/008_vendor_entity_fix.sql:/docker-entrypoint-initdb.d/08-vendor-fix.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U horeca_admin -d horeca_portal']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: horeca-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: horeca-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@horeca.uz
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-horeca_pgadmin_2024}
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
